services:
  - type: web
    name: netflix-cookie-backend
    runtime: python
    repo: https://github.com/YOUR_USERNAME/netflix-cookie-manager
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
